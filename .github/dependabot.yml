version: 2

updates:
  # 🔹 Frontend (Next.js / Node.js)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  # 🔹 Backend (Python / FastAPI)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"

  # 🔹 GitHub Actions (CI/CD)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # 🔹 Docker (optional but recommended)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
